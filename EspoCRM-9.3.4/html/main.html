<!doctype html>
<html>
    <head>
        <title>{{applicationName}}</title>
        <script type="application/json" data-name="loader-params">{{loaderParams}}</script>{{scriptsHtml}}
        <link rel="stylesheet" href="{{basePath}}{{stylesheet}}?r={{cacheTimestamp}}" id='main-stylesheet'>{{additionalStyleSheetsHtml}}{{linksHtml}}
        <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
        <meta content="utf-8" http-equiv="encoding">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="description" content="{{applicationDescription}}">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="alternate icon" href="{{basePath}}{{faviconAlternate}}" type="image/x-icon">
        <link rel="icon" href="{{basePath}}{{favicon}}" type="{{faviconType}}">
        <script nonce="{{nonce}}">
            let loadedApp;

            const run = app => {
                {{runScript}}
            };

            const init = () => {
                require('{{appClientClassName}}', App => {
                    new App({
                        id: '{{applicationId}}',
                        useCache: {{useCache}},
                    cacheTimestamp: {{cacheTimestamp}},
                    appTimestamp: {{appTimestamp}},
                    basePath: '{{basePath}}',
                    apiUrl: '{{apiUrl}}',
                    ajaxTimeout: {{ajaxTimeout}},
                    internalModuleList: {{internalModuleList}},
                    bundledModuleList: {{bundledModuleList}},
                    theme: {{theme}},
                }, app => {
                        loadedApp = app;

                        run(app);
                    });
                });
            };

            window.addEventListener('pageshow', event => {
                if (event.persisted && loadedApp) {
                    run(loadedApp);

                    return;
                }

                init();
            });
        </script>
    </head>
    <body data-id="{{applicationId}}">
        <div class="container content"></div>
        <footer>
            <p class="credit small">&copy; 2026
            <a href="https://www.espocrm.com" title="Powered by EspoCRM" rel="noopener" target="_blank">EspoCRM, Inc.</a></p>
        </footer>
        <script nonce="{{nonce}}">
            document.addEventListener('click', event => {
                const interactiveSelector = [
                    'a', 'button', 'input', 'select', 'textarea', '[contenteditable="true"]',
                    '.btn', '.dropdown-toggle', '.dropdown-menu',
                    '.inline-edit-link', '.inline-save-link', '.inline-cancel-link'
                ].join(', ');

                if (event.target.closest(interactiveSelector)) return;

                const cell = event.target.closest(
                    '.record .cell[data-name], .record .field-cell[data-name], .record .form-group[data-name]'
                );

                if (!cell || cell.classList.contains('hidden') || cell.classList.contains('hidden-cell')) return;

                const editTrigger = cell.querySelector(
                    '[data-action="edit"], .action[data-action="edit"], .inline-edit-link, .edit-link'
                );

                if (!editTrigger) return;

                const alreadyEditing =
                    cell.querySelector('.inline-save-link, .inline-cancel-link') &&
                    cell.querySelector('input, select, textarea, [contenteditable="true"]');

                if (alreadyEditing) return;

                event.preventDefault();
                event.stopPropagation();

                editTrigger.dispatchEvent(new MouseEvent('click', {
                    bubbles: true,
                    cancelable: true,
                    view: window,
                }));
            }, true);
        </script>
    </body>
</html>
